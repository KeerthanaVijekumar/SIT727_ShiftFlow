apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: employee-hpa
  labels:
    app: shiftflow
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: employee-deployment
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 60
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70