apiVersion: v1
kind: ServiceAccount
metadata:
  name: shiftflow-service-account
  namespace: default
  labels:
    app: shiftflow
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: shiftflow-role
  namespace: default
  labels:
    app: shiftflow
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "configmaps", "secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: shiftflow-role-binding
  namespace: default
  labels:
    app: shiftflow
subjects:
  - kind: ServiceAccount
    name: shiftflow-service-account
    namespace: default
roleRef:
  kind: Role
  name: shiftflow-role
  apiGroup: rbac.authorization.k8s.io